<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学习资源导航站 | Learning Hub</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="logo">
        <span class="logo-icon">📚</span>
        <span class="logo-text">Learning Hub</span>
      </div>
      <nav class="header-nav">
        <a href="https://github.com/heboshangui" target="_blank" class="nav-link">GitHub</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h1 class="hero-title">学习资源导航站</h1>
      <p class="hero-subtitle">发现优质学习资源，涵盖编程开发、AI机器学习、设计产品、金融投资、语言学习等领域</p>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="搜索资源..." autocomplete="off">
        <span class="search-icon">🔍</span>
      </div>
    </section>

    <!-- Stats Bar -->
    <section id="statsBar" class="stats-bar"></section>

    <!-- Status Filter Bar -->
    <section class="status-filter-bar">
      <button class="status-btn active" data-status="all">全部</button>
      <button class="status-btn" data-status="pending">⭕ 未学</button>
      <button class="status-btn" data-status="learning">🔄 在学</button>
      <button class="status-btn" data-status="completed">✅ 已学</button>
    </section>

    <!-- Tag Filter Bar -->
    <section id="tagFilterBar" class="tag-filter-bar"></section>

    <section class="category-nav">
      <button class="cat-btn active" data-category="all">全部</button>
      <button class="cat-btn" data-category="programming">💻 编程开发</button>
      <button class="cat-btn" data-category="ai">🤖 AI/ML</button>
      <button class="cat-btn" data-category="design">🎨 设计产品</button>
      <button class="cat-btn" data-category="finance">💰 金融投资</button>
      <button class="cat-btn" data-category="language">🌏 语言学习</button>
      <button class="cat-btn" data-category="general">🚀 综合资源</button>
    </section>

    <section id="resourceGrid" class="resource-grid"></section>

    <section id="noResults" class="no-results hidden">
      <p>没有找到匹配的资源，试试其他关键词 🔍</p>
    </section>
  </main>

  <!-- Note Modal -->
  <div id="noteModal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-title" id="noteModalTitle">📝 学习笔记</span>
        <button class="modal-close" id="noteModalClose" aria-label="关闭">✕</button>
      </div>
      <div class="modal-body">
        <p class="modal-resource-name" id="noteModalResource"></p>
        <textarea id="noteTextarea" placeholder="写下你的学习心得、摘录或疑问..."></textarea>
      </div>
      <div class="modal-footer">
        <button class="modal-btn modal-btn-secondary" id="noteModalCancel">取消</button>
        <button class="modal-btn modal-btn-primary" id="noteModalSave">保存笔记</button>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="container">
      <p>Built with ❤️ by <a href="https://github.com/heboshangui" target="_blank">@heboshangui</a> · 使用 GitHub Pages / Vercel 托管</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
